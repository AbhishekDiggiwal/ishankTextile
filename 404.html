<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link rel="icon" type="image/png" href="logo.png"/>
    <title>Page Not Found - Ishank Textile</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "primary": "#aa0021",
              "secondary": "#585f67",
              "surface": "#f9f9f9",
              "on-surface": "#1a1c1c",
              "on-surface-variant": "#5c403f",
              "surface-container-lowest": "#ffffff"
            }
          }
        }
      }
    </script>
    <style>
      .textile-overlay {
        background-image: radial-gradient(circle at 2px 2px, rgba(0,0,0,0.03) 1px, transparent 0);
        background-size: 20px 20px;
      }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md overflow-x-hidden textile-overlay min-h-screen flex flex-col justify-between">
    <!-- Top Header / Logo -->
    <header class="w-full bg-surface/80 backdrop-blur-xl border-b border-outline-variant/30 shadow-sm py-4">
        <div class="max-w-[1200px] mx-auto px-6 flex items-center justify-between">
            <a href="index.html" class="font-label-mono text-lg md:text-xl font-bold text-primary flex items-center gap-2 md:gap-3 hover:opacity-90 transition-opacity">
                <img class="h-10 w-auto object-contain" src="logo.png" alt="Ishank Textile Logo"/>
                <span class="truncate">ISHANK TEXTILE</span>
            </a>
            <a href="index.html" class="inline-flex items-center gap-2 text-primary font-semibold text-sm hover:underline">
                <span class="material-symbols-outlined text-[18px]">home</span>
                <span>Back to Home</span>
            </a>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow flex flex-col items-center justify-center py-16 px-6 max-w-2xl mx-auto text-center">
        <!-- Illustrative Representation of broken page -->
        <div class="w-72 md:w-96 mb-8 hover:scale-[1.02] transition-transform duration-300">
            <img src="broken_page.png" alt="Broken Page Illustration" class="w-full h-auto rounded-2xl shadow-lg border border-outline-variant/10 bg-white p-4"/>
        </div>

        <h1 class="text-7xl md:text-9xl font-bold text-primary tracking-tight mb-2">404</h1>
        <h2 class="text-2xl md:text-3xl font-bold text-on-surface mb-4 uppercase">Page Not Found</h2>
        <p class="text-on-surface-variant text-base md:text-lg mb-8 max-w-md mx-auto leading-relaxed">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Let's get you back on track.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center w-full max-w-xs sm:max-w-none">
            <a href="index.html" class="px-8 py-3 bg-primary text-on-primary font-bold hover:scale-[1.03] active:scale-95 transition-all duration-150 rounded-full shadow-md text-white text-center flex items-center justify-center gap-2">
                <span class="material-symbols-outlined">home</span>
                <span>Return Home</span>
            </a>
            <a href="products-catalogue.html" class="px-8 py-3 bg-secondary text-on-secondary font-bold hover:scale-[1.03] active:scale-95 transition-all duration-150 rounded-full shadow-md text-white text-center flex items-center justify-center gap-2">
                <span class="material-symbols-outlined">grid_view</span>
                <span>Browse Fabrics</span>
            </a>
        </div>
    </main>

    <!-- Simple Footer -->
    <footer class="w-full border-t border-outline/5 text-center py-6 bg-surface-container-lowest">
        <p class="text-on-surface-variant/80 text-xs">© 2024 Ishank Textile. All rights reserved.</p>
    </footer>
</body>
</html>
