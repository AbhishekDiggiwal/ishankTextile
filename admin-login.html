<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Ishank Textile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-orange': '#d11e33',
                        'brand-orange-dark': '#aa0021',
                        'dark-gray': '#121c26',
                    },
                    fontFamily: {
                        'sans': ['Rubik', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.14);
        }
        
        .login-bg {
            background:
                radial-gradient(circle at 2px 2px, rgba(255,255,255,0.035) 1px, transparent 0),
                linear-gradient(135deg, #121c26 0%, #232a31 50%, #121c26 100%);
            background-size: 4px 4px, auto;
        }
        
        .form-input {
            transition: all 0.3s ease;
            border: 2px solid #e5e7eb;
        }
        .form-input:focus {
            border-color: #aa0021;
            box-shadow: 0 0 0 3px rgba(170, 0, 33, 0.12);
        }
        
        .shake {
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        
        .error-message {
            animation: slideDown 0.3s ease-out;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo Section -->
        <div class="text-center mb-8">
            <img class="mx-auto h-16 w-auto object-contain mb-4 filter drop-shadow-md" src="logo.png" alt="Ishank Textile Logo"/>
            <h1 class="text-2xl font-bold text-white mb-2">Admin Login</h1>
            <p class="text-gray-400">Ishank Textile Management System</p>
        </div>
        
        <!-- Login Card -->
        <div class="glass-card p-8">
            <form id="loginForm" class="space-y-6">
                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-gray-400"></i>
                        </div>
                        <input 
                            type="email" 
                            id="email" 
                            required
                            class="form-input w-full pl-10 pr-4 py-3 rounded-lg"
                            placeholder="admin@example.com"
                            autocomplete="email"
                        >
                    </div>
                </div>
                
                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input 
                            type="password" 
                            id="password" 
                            required
                            class="form-input w-full pl-10 pr-12 py-3 rounded-lg"
                            placeholder="Enter password"
                            autocomplete="current-password"
                        >
                        <button 
                            type="button" 
                            onclick="togglePassword()"
                            class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600"
                        >
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>
                
                <!-- Error Message -->
                <div id="errorMessage" class="hidden error-message bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm">
                    <i class="fas fa-exclamation-circle mr-2"></i>
                    <span id="errorText">Invalid credentials</span>
                </div>
                
                <!-- Login Button -->
                <button 
                    type="submit" 
                    class="w-full bg-brand-orange hover:bg-brand-orange-dark text-white font-semibold py-3 rounded-lg transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] shadow-lg hover:shadow-xl"
                >
                    <i class="fas fa-sign-in-alt mr-2"></i>
                    Login
                </button>
                
                <!-- Back to Website -->
                <div class="text-center pt-4">
                    <a href="index.html" class="text-gray-500 hover:text-brand-orange text-sm transition-colors">
                        <i class="fas fa-arrow-left mr-1"></i>
                        Back to Website
                    </a>
                </div>
            </form>
        </div>
        
        <!-- Security Notice -->
        <div class="text-center mt-6 text-gray-500 text-xs">
            <i class="fas fa-shield-alt mr-1"></i>
            Secure Admin Access Only
        </div>
    </div>

    <script>
        // Firebase Auth instance
        const auth = firebase.auth();
        
        // Check if already logged in
        function checkAuth() {
            auth.onAuthStateChanged((user) => {
                if (user) {
                    // User is signed in, redirect to dashboard
                    window.location.href = 'admin-dashboard.html';
                }
            });
        }
        
        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }
        
        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const form = document.getElementById('loginForm');
            
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
            form.classList.add('shake');
            
            setTimeout(() => {
                form.classList.remove('shake');
            }, 500);
        }
        
        // Hide error message
        function hideError() {
            document.getElementById('errorMessage').classList.add('hidden');
        }
        
        // Login handler
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            hideError();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            // Validate inputs
            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }
            
            // Sign in with Firebase Auth
            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Signed in successfully
                    window.location.href = 'admin-dashboard.html';
                })
                .catch((error) => {
                    // Handle errors
                    let errorMessage = 'Invalid email or password';
                    if (error.code === 'auth/user-not-found') {
                        errorMessage = 'No account found with this email';
                    } else if (error.code === 'auth/wrong-password') {
                        errorMessage = 'Incorrect password';
                    } else if (error.code === 'auth/invalid-email') {
                        errorMessage = 'Please enter a valid email address';
                    }
                    showError(errorMessage);
                    document.getElementById('password').value = '';
                });
        });
        
        // Clear error on input
        document.getElementById('email').addEventListener('input', hideError);
        document.getElementById('password').addEventListener('input', hideError);
        
        // Check auth status on page load
        checkAuth();
        
    </script>
</body>
</html>
